<!DOCTYPE html>
<html>
  <head>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
      <title>PotatoOS</title>
      <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body class="nanum-pen-script-regular" style="background-image:url(./ptoaopt.png); background-size: cover;""> 
    <div style="display: flex; justify-content: space-around; backdrop-filter: blur(8px); border-radius: 16px; background-color: rgba(249, 242, 255,0.25); filter:drop-shadow(0 0 8px black);">
      <p>
        Potato OS
      </p>
      <p>
        Do you like potatoes?
      </p>
      <p id="timeCurrent">
        Time:
      </p>
    </div>

    <div class="page" id="welcome" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30vw; height: 50vh;">
      
      <div id="welcomeheader" class="header"> 
        <img src="closebutton.png" style=" max-height:40px" id="welcomeclose">
      </div>
      <p style="padding-top: 16px; padding-bottom: 4px; padding-left: 16px;">welcome to potatoOS :)</p>
      <p style="padding-bottom: 16px; padding-top: 4px; padding-left: 16px;">here we like eating potatoes :D</p>
      <img src="Image_20250620_152634_594.gif" style="max-height: 200px; padding: 16px; border-radius: 50px;">
      
    </div>
    <div class="page" id="potato" style="top: 35%; left: 85%; transform: translate(-50%, -50%); width: 20vw; height: 50vh;">
      
      <div id="potatoheader" class="header"> 
        <img src="closebutton.png" style=" max-height:40px" id="potatoclose">
        <p>notepad</p>
      </div>
      <div style="overflow-y: scroll; padding: 16px;">
        <p contenteditable="True">
          <span contenteditable="true">Welcome to <strong>potato notes :)</strong></span>

          <br>
          <br>

          Feel free to edit this text as you would like :D
        </p>
      </div>
      
    </div>
    <div class="page" id="blueberry" style="top: 75%; left: 25%; transform: translate(-50%, -50%); width: 30vw; height: 20vh;">
      
      <div id="blueberryheader" class="header"> 
        <img src="closebutton.png" style=" max-height:40px" id="blueberryclose">
      </div>
      <p style="padding: 16px">egg tart :D</p> 
    </div>

    <div style="display: flex; position: absolute; bottom: 16px; filter:drop-shadow(0 0 8px rgb(0, 0, 0)); left: 50%; transform: translateX(-50%);justify-content: space-around; backdrop-filter: blur(8px); border-radius: 16px;
       background-color: rgba(249, 242, 255,0.25); gap: 10px;">
      <img src="IMG_6760.PNG" title="PENGUIN :D" class="appicon" id="potatoopen">
      <img src="IMG_6647.png" title="BLUEBERRY :D" class="appicon" id="blueberryopen">
      <img src="IMG_6823.png" title="welcome :D" class="appicon" id="welcomeopen">
    </div>
    <script src="script.js">

    </script>
